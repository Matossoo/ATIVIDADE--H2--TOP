<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Gamer</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:100%;
            max-width:650px;
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0 20px 60px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            color:#667eea;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:35px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            border:2px solid #ddd;
            border-radius:8px;
            font-size:1rem;
        }

        input:focus{
            outline:none;
            border-color:#667eea;
        }

        .btn-group{
            display:flex;
            gap:15px;
            margin-top:30px;
        }

        .btn{
            flex:1;
            padding:14px;
            border:none;
            border-radius:8px;
            font-size:1rem;
            font-weight:bold;
            text-decoration:none;
            text-align:center;
            cursor:pointer;
            transition:0.3s;
        }

        .btn-primary{
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            color:white;
        }

        .btn-secondary{
            background:#e0e0e0;
            color:#333;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🎮 Cadastro Gamer</h1>

    <p class="subtitle">
        Preencha os dados do usuário gamer
    </p>

    <form th:action="@{/salvar}"
          th:object="${usuarios}"
          method="post">

        <input type="hidden" th:field="*{id}">

        <div class="form-group">

            <label>Nickname</label>

            <input type="text"
                   th:field="*{nickname}"
                   placeholder="Digite o nickname"
                   required>

        </div>

        <div class="form-group">

            <label>Email</label>

            <input type="email"
                   th:field="*{email}"
                   placeholder="Digite o email"
                   required>

        </div>

        <div class="form-group">

            <label>Nível</label>

            <input type="number"
                   th:field="*{nivel}"
                   placeholder="Digite o nível"
                   min="1"
                   required>

        </div>

        <div class="form-group">

            <label>Jogo Favorito</label>

            <input type="text"
                   th:field="*{jogoFavorito}"
                   placeholder="Digite o jogo favorito"
                   required>

        </div>

        <div class="btn-group">

            <button type="submit"
                    class="btn btn-primary">

                💾 Salvar

            </button>

            <a th:href="@{/}"
               class="btn btn-secondary">

                ❌ Cancelar

            </a>

        </div>

    </form>

</div>

</body>
</html>
